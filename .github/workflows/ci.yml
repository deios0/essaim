name: ci
on: [push, pull_request]
env:
  # Pin the toolchain: go.mod is `go 1.24` (a supported release; 1.22 is EOL and
  # ships known-fixed stdlib CVEs) and all deps build on 1.24; never let a
  # transitive dep auto-upgrade the toolchain in CI.
  GOTOOLCHAIN: local
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24.x' }
      - run: CGO_ENABLED=0 go build -trimpath -o essaim ./cmd/essaim
      - run: go vet ./...
      - name: gofmt
        run: 'test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)'
      - run: CGO_ENABLED=1 go test -race ./...
      - run: go install github.com/google/go-licenses@latest && go-licenses check ./... --disallowed_types=forbidden,restricted
      - name: no phone-home
        # essaim must ship no telemetry / analytics / auto-update. concepts.go is
        # the rule-matching VOCABULARY map: it lists observability-domain WORDS
        # ("opentelemetry", "sentry", …) as rule concepts, NOT as dependencies or
        # calls — so it is excluded; every other .go file is checked strictly.
        run: |
          hits=$(grep -rEn "telemetry|auto.?update|analytics|posthog|sentry" --include=*.go . \
            | grep -v 'internal/rules/concepts.go' || true)
          if [ -n "$hits" ]; then echo "$hits"; echo "phone-home markers found"; exit 1; fi
